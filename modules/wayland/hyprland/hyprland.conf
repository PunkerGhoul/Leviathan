source = ~/.config/hypr/themes/Dracula.conf
# #######################################################################################
# MODULAR HYPRLAND CONFIG
# EDIT THE INDIVIDUAL FILES IN hypr/ TO CUSTOMIZE EACH SECTION
# #######################################################################################

###################
### THEME SETUP ###
###################


############################
### MODULAR CONFIG FILES ###
############################

# Configuration is split into modular files for better organization:
# - monitors.conf: Display configuration
# - programs.conf: Default applications
# - autostart.conf: Programs to launch at startup
# - variables.conf: Environment variables
# - look-and-feel.conf: Appearance, animations, layouts
# - input.conf: Keyboard, mouse, touchpad, gestures
# - keybinds.conf: All keyboard shortcuts and bindings
# - rules.conf: Window and workspace rules

source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/programs.conf
source = ~/.config/hypr/autostart.conf
source = ~/.config/hypr/variables.conf
source = ~/.config/hypr/look-and-feel.conf
source = ~/.config/hypr/input.conf
source = ~/.config/hypr/keybinds.conf
source = ~/.config/hypr/rules.conf

# HyprEmoji config
#source = ~/.config/hypremoji/hypremoji.conf

