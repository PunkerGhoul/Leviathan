#################
### AUTOSTART ###
#################

exec-once = qs -p ~/.config/quickshell/shell.qml
exec-once = swww-daemon
exec-once = mako
exec-once = hypridle
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = sh -lc 'if ! pgrep -x "leviathan-battery-monitor" >/dev/null 2>&1; then nohup leviathan-battery-monitor >/dev/null 2>&1 & fi'
exec-once = sh -lc 'if pgrep -f "hyprpolkitagent|lxqt-policykit-agent|polkit-gnome-authentication-agent-1" >/dev/null 2>&1; then exit 0; fi; if [ -x "$HOME/.nix-profile/libexec/hyprpolkitagent" ]; then exec "$HOME/.nix-profile/libexec/hyprpolkitagent"; elif command -v lxqt-policykit-agent >/dev/null 2>&1; then exec lxqt-policykit-agent -style Fusion -stylesheet "$HOME/.config/hypr/polkit-agent.qss"; elif [ -x "$HOME/.nix-profile/libexec/polkit-gnome-authentication-agent-1" ]; then exec "$HOME/.nix-profile/libexec/polkit-gnome-authentication-agent-1"; fi'
exec-once = wl-paste --watch cliphist store
