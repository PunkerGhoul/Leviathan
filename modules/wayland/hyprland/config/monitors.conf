################
### MONITORS ###
################

# Internal laptop display (with scale factor)
# Disabled by default to prevent mouse capture when lid is closed at boot
# Will be enabled by lid switch binding in keybinds.conf when lid opens

# monitor=eDP-1,disable <--use only when connecting external monitors

#monitor=eDP-1,prefered,auto,auto
monitor=eDP-1,prefered,auto,1.2

# External monitor (Dell P2017H via HDMI)
monitor=HDMI-A-1,1920x1080@60,0x0,1

# Fallback for any unspecified monitor
# monitor=,preferred,auto,1
